<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balansemetoden & Interaktiv Algebra</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <header>
        <h1>Balansemetoden & Interaktiv Algebra</h1>
        <p>Utfør operasjoner på begge sider av ligninger, eller forenkle uttrykk ved å klikke på parenteser, potenser og kvadratsetninger!</p>
    </header>

    <div class="controls">
        <div class="control-group mode-selector">
            <label for="mode-select"><strong>Modus: </strong></label>
            <select id="mode-select">
                <option value="equation">Løs Ligning (Venstre = Høyre)</option>
                <option value="expression">Forenkle Uttrykk (Ren Algebra)</option>
            </select>
        </div>

        <div class="control-group">
            <label for="example-select">Velg et eksempel: </label>
            <select id="example-select"></select>
            <button id="btn-load-example">Last inn</button>
        </div>
        
        <div class="custom-eq-group">
            <span class="divider"></span>
            <label>Eller skriv egen: </label>
            <input type="text" id="custom-left" placeholder="x^2 - 9" style="width: 120px;">
            <span id="equals-sign"> = </span>
            <input type="text" id="custom-right" placeholder="0" style="width: 120px;">
            <button id="btn-load-custom">Start</button>
        </div>
    </div>

    <div id="workspace-container">
        <div id="workspace">
            </div>
        <div id="success-message" class="hidden">
            🎉 Gratulerer! Oppgaven er løst! 🎉
        </div>
    </div>

    <div class="export-settings">
        <h3 style="margin-bottom: 5px;">Lagre dokumentasjon</h3>
        <input type="text" id="export-title" placeholder="Tittel (f.eks. Oppgave 3a)">
        <textarea id="export-desc" placeholder="Forklar hva du har gjort, eller skriv inn oppgaveteksten..." rows="2"></textarea>
        
        <div class="export-container">
            <button id="btn-export-tab" class="btn-export" style="background-color: #28a745; margin-right: 10px;">🖼️ Åpne bilde i ny fane</button>
            <button id="btn-export-dl" class="btn-export">⬇️ Last ned bilde</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
